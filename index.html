    <style>
        :root {
            --bg-color: #0e1621;
            --card-bg: #17212b;
            --text-color: #f5f5f5;
            --text-muted: #808d9a;
            --accent-color: #2481cc;
            --accent-hover: #2b96e6;
            --price-color: #4cd964;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .search-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 30px auto;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 15px 20px;
            background-color: var(--card-bg);
            border: 2px solid #24303f;
            border-radius: 30px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-container input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(36, 129, 204, 0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #24303f;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
            color: inherit;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 6px 12px rgba(36, 129, 204, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .star-icon {
            color: #ffb300;
            margin-right: 12px;
            font-size: 1.2rem;
            display: inline-block;
            line-height: 1;
        }

        .server-icon {
            width: 20px;
            height: 20px;
            border: 2px solid #00d2ff;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
            box-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }

        .server-icon .line {
            width: 10px;
            height: 2px;
            background-color: #00d2ff;
            border-radius: 1px;
        }

        .platform-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-body {
            margin-bottom: 15px;
        }

        .count-info {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .count-value {
            color: var(--text-color);
            font-weight: 500;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .price-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--price-color);
        }

        .buy-btn {
            background-color: var(--accent-color);
            color: #ffffff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .card:hover .buy-btn {
            background-color: var(--accent-hover);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: none;
        }
    </style>
</head>

        const grid = document.getElementById('priceGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');

        function generateTgLink(item) {
            const username = 'liamurphy';
            let text = '';
            
            if (item.isOther) {
                text = "Привет!\nХочу купить аккаунт/номер на платформу -\nПодскажи цену на эту страну -";
            } else {
                text = `Привет! Я хочу купить аккаунт для платформы ${item.name} ; подскажи прайс аккаунтов/номеров для этой платформы!`;
            }
            
            return `https://t.me/${username}?text=${encodeURIComponent(text)}`;
        }

        function displayCards(data) {
            const cards = grid.querySelectorAll('.card');
            cards.forEach(card => card.remove());

            if(data.length === 0) {
                noResults.style.display = 'block';
                return;
            } else {
                noResults.style.display = 'none';
            }

            data.forEach(item => {
                const tgLink = generateTgLink(item);
                
                const iconHtml = item.isOther 
                    ? `<div class="server-icon"><div class="line"></div><div class="line"></div><div class="line"></div></div>`
                    : `<span class="star-icon">★</span>`;
                
                const cardHtml = `
                    <a href="${tgLink}" target="_blank" class="card" data-name="${item.name.toLowerCase()}">
                        <div class="card-header">
                            ${iconHtml}
                            <div class="platform-name" title="${item.name}">${item.name}</div>
                        </div>
                        <div class="card-body">
                            <div class="count-info">В наличии: <span class="count-value">${item.count}</span></div>
                        </div>
                        <div class="card-footer">
                            <div>
                                <div class="price-label">Цена от</div>
                                <div class="price-value">${item.price}</div>
                            </div>
                            <div class="buy-btn">Купить</div>
                        </div>
                    </a>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        displayCards(rawData);

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filteredData = rawData.filter(item => item.name.toLowerCase().includes(query));
            displayCards(filteredData);
        });
